name: kubent-tests

on:
  push:
    paths:
      - 'kubent/**'
  pull_request:
    paths:
      - 'kubent/**'

jobs:
  test:
    name: Kubent Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: kubent

      - name: Run unit tests
        run: uv run python -m pytest test/ -v --tb=short
        working-directory: kubent

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kubent-test-results
          path: kubent/.pytest_cache/
